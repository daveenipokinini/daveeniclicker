<style> /* css is basically js like it kinda pmo for me */
body {
    background-color: black;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
    padding-top: 40px; /* leave space for header */
    overflow-y: auto;
    height: 100vh;
    box-sizing: border-box;
}

/* --- Sliding Header --- */
#slidingHeader {
    position: fixed;
    top: 0;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    background-color: black;
    color: white;
    font-size: 20px;
    padding: 8px 0;
    z-index: 1000;
}
#slidingHeader span {
    display: inline-block;
    padding-left: 100%;
    animation-name: slideText;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    animation-duration: 1200s; /* gyat to see ts  ARRRRF ARRRRF ARRFF */
}
@keyframes slideText {
    0% { transform: translateX(0%); }
    100% { transform: translateX(-100%); }
}

/* --- Headings and Buttons --- */
h2 { font-size: 50px; }

/* All buttons (main and shop) */
button {
    font-size: 20px;
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: #222; /* normal color */
    color: white;
    transition: 0.15s;
}

/* Hover effect for enabled buttons */
button:hover:not(:disabled) {
    background-color: #666; /* brighter hover effect */
}

/* Disabled buttons */
button:disabled, 
#otherShopItems button:disabled {
    background-color: #111; /* darker to show disabled */
    color: #555;           /* dim text */
    cursor: default;       /* remove pointer */
}

/* --- Shop Section --- */
#shopItems { display: none; margin-top: 20px; }

#shopItems button {
    margin: 0; /* remove extra margins inside shop rows */
}

.shop-row {
    display: flex;
    justify-content: center;
    gap: 20px; /* space between two shop buttons */
    margin-bottom: 20px; /* space below this row before Other Shops */
}

#otherShopsButton {
    margin-top: 40px;
    font-size: 20px;
    padding: 10px 20px;
    border-radius: 10px;
    background-color: #222;
    color: white;
    cursor: pointer;
    transition: 0.15s;
}
#otherShopsButton:hover:not(:disabled) { background-color: #666; }

/* --- Popup Overlay --- */
#popupOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); display: flex;
    justify-content: center; align-items: center; z-index: 999;
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
}
#popupOverlay.show { opacity: 1; pointer-events: auto; }

#popupBox {
    background: #222; padding: 20px 40px; border-radius: 12px;
    font-size: 20px; color: white;
    text-align: center; transform: translateY(30px); opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
    position: relative;
}
#popupOverlay.show #popupBox { transform: translateY(0); opacity: 1; }

#closeOtherShops {
    display: block;
    margin: 15px auto 0 auto;
    background-color: #800;
    padding: 6px 12px;
    font-size: 16px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}
#closeOtherShops:hover:not(:disabled) { background-color: #a00; }

/* --- Reset and Code Buttons --- */
#resetButton {

#codeButton {

#codeInput {

/* --- Collection Button (bottom center, green) */

// formatting numbers with suffixes which took me way too long
function formatNumber(num) {
    if (num < 1e6) {
        return num.toLocaleString(undefined, { maximumFractionDigits: 2 });
    }
    
    const suffixes = [
        { value: 1e36, symbol: "Udc" },
        { value: 1e33, symbol: "Dc" },
        { value: 1e30, symbol: "No" },
        { value: 1e27, symbol: "Oc" },
        { value: 1e24, symbol: "Sp" },
        { value: 1e21, symbol: "Sx" },
        { value: 1e18, symbol: "Qi" },
        { value: 1e15, symbol: "Qa" }, 
        { value: 1e12, symbol: "T" }, 
        { value: 1e9,  symbol: "B" }, 
        { value: 1e6,  symbol: "M" }
    ];

    for (let i = 0; i < suffixes.length; i++) {
        if (num >= suffixes[i].value) {
            let formatted = (num / suffixes[i].value).toFixed(2);
            
           
            formatted = parseFloat(formatted).toString(); 
            
            return formatted + suffixes[i].symbol;
        }
    }

    return num.toString();
}

function startFrenzy() {
    if(frenzyActive) return;

    showPopup(`${frenzyMultiply}x Click Value Frenzy!`, { duration: 1000, blockEscape: true });

    setTimeout(() => {
        frenzyActive = true;
        originalClickValue = clickValue;
        clickValue *= frenzyMultiply; // use upgraded multiply

        document.body.style.backgroundImage = "url('https://static.vecteezy.com/system/resources/thumbnails/022/166/851/small/usa-dollar-fall-with-alpha-channel-free-video.jpg')";
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
        document.body.style.backgroundRepeat = "no-repeat";
        document.body.style.backgroundAttachment = "fixed";
        document.body.style.color = "white";

        frenzyTimeLeft = frenzyDuration; // use upgraded duration
        frenzyTimerSpan.style.display = "inline";

        frenzyInterval = setInterval(() => {
            frenzyTimeLeft--;
            frenzyTimerSpan.textContent = `${frenzyTimeLeft}s`;

            if(frenzyTimeLeft <= 0){
                endFrenzy();
            }
        }, 1000);

        updateClickButton();
    }, 1000);
}

function endFrenzy() {
    frenzyActive = false;
    clickValue = clickValue /= 10

    document.body.style.backgroundImage = "";
    document.body.style.backgroundColor = "black";
    document.body.style.color = "white";

    frenzyTimerSpan.style.display = "none";
    clearInterval(frenzyInterval);
    frenzyInterval = null;

    updateClickButton();
    showPopup("Frenzy ended!", { duration: 1000 });
}

// popup system
function showPopup(message, options = {}) {
    const duration = options.duration || 1000;
    const blockEscape = options.blockEscape || false;
    popupContent.innerHTML = message;
    popupOverlay.classList.add('show');

    let canClose = !blockEscape;

    setTimeout(() => {
        popupOverlay.classList.remove('show');
    }, duration);

    if (!blockEscape) {
        popupOverlay.addEventListener('click', () => {
            popupOverlay.classList.remove('show');
        }, { once: true });
    }
}

// collection system
function checkCollectionUnlocks(){
    collectionItems.forEach(item=>{
        if(!item.unlocked && count>=item.unlock){
            item.unlocked=true;
            showPopup(`New item unlocked: ${item.alt} at ${formatNumber(item.unlock)}!`, {duration:2000});}
    });
}

function showCollectionPopup(){
    popupOverlay.classList.add('show');
    popupContent.innerHTML = `
        <h3 style="margin-bottom:10px;">Your Collection</h3>
        <div class="collectionPopupContent"></div>
        <button id="closeCollection">Close</button>
    `;

    const container = popupContent.querySelector('.collectionPopupContent');
    const unlockedItems = collectionItems.filter(i => i.unlocked);

    if (unlockedItems.length === 0){
        container.innerHTML = '<p>No images collected yet.</p>';
    } else {
        container.innerHTML = unlockedItems.map(i => `
            <div class="collectionItem">
                <img src="${i.url}" alt="${i.alt}">
                <span>Collected at ${formatNumber(i.unlock)}</span>
            </div>
        `).join('');
    }

    document.getElementById('closeCollection').addEventListener('click', () => {
        popupOverlay.classList.remove('show');
    });
}

collectionButton.addEventListener('click', showCollectionPopup);

otherShopsButton.addEventListener('click', showOtherShopsPopup);

function showOtherShopsPopup() {
    popupOverlay.classList.add('show');
    popupContent.innerHTML = `
        <h3>Other Shops</h3>
        <div id="otherShopItems">
            <div class="shop-row">
                <div>
                    <button id="upgradeFrenzyDuration">Upgrade Frenzy Duration</button>
                    <div class="button-info" id="frenzyDurationInfo">
                        Duration: ${frenzyDuration}s | Cost: ${formatNumber(frenzyDurationCost)}
                    </div>
                </div>
                <div>
                    <button id="upgradeFrenzyMultiply">Upgrade Frenzy Multiply</button>
                    <div class="button-info" id="frenzyMultiplyInfo">
                        Multiply: ${formatNumber(frenzyMultiply)}x | Cost: ${formatNumber(frenzyMultiplyCost)}
                    </div>
                </div>
            </div>
        </div>
        <button id="closeOtherShops">Close</button>
    `;

    const durationButton = document.getElementById('upgradeFrenzyDuration');
    const multiplyButton = document.getElementById('upgradeFrenzyMultiply');

    updateOtherShopsButtons();

    durationButton.addEventListener('click', () => {
        if (count >= frenzyDurationCost && frenzyDuration < 180) {
            count -= frenzyDurationCost;
            frenzyDuration += 15;
            if (frenzyDuration > 180) frenzyDuration = 180;
            frenzyDurationCost *= 1.2;
            updateDisplay();
            saveGame();
            updateOtherShopsButtons();
        }
    });

    multiplyButton.addEventListener('click', () => {
    const maxMultiply = 50; // ts

    if (count >= frenzyMultiplyCost && frenzyMultiply < maxMultiply) {
        count -= frenzyMultiplyCost;
        frenzyMultiply += 5;
        if (frenzyMultiply > maxMultiply) frenzyMultiply = maxMultiply;

        frenzyMultiplyCost *= 1.2;

        updateDisplay();
        saveGame();
        updateOtherShopsButtons();
    }
});

    document.getElementById('closeOtherShops').addEventListener('click', () => {
        popupOverlay.classList.remove('show');
    });
}

function updateOtherShopsButtons() {
    const durationButton = document.getElementById('upgradeFrenzyDuration');
    const multiplyButton = document.getElementById('upgradeFrenzyMultiply');

    if (!durationButton || !multiplyButton) return;

    // max it up GRRR
    const maxDuration = 180;
    const maxMultiply = 50;

    durationButton.disabled = count < frenzyDurationCost || frenzyDuration >= maxDuration;
    durationButton.style.cursor = durationButton.disabled ? "not-allowed" : "pointer";
    durationButton.style.opacity = durationButton.disabled ? "0.4" : "1";

    if (frenzyDuration >= maxDuration) {
        document.getElementById('frenzyDurationInfo').textContent =
            `Duration: ${frenzyDuration}s | Max Upgrade`;
    } else {
        document.getElementById('frenzyDurationInfo').textContent =
            `Duration: ${frenzyDuration}s | Cost: ${formatNumber(frenzyDurationCost)}`;
    }

    multiplyButton.disabled = count < frenzyMultiplyCost || frenzyMultiply >= maxMultiply;
    multiplyButton.style.cursor = multiplyButton.disabled ? "not-allowed" : "pointer";
    multiplyButton.style.opacity = multiplyButton.disabled ? "0.4" : "1";

    if (frenzyMultiply >= maxMultiply) {
        document.getElementById('frenzyMultiplyInfo').textContent =
            `Multiply: ${formatNumber(frenzyMultiply)}x | Max Upgrade`;
    } else {
        document.getElementById('frenzyMultiplyInfo').textContent =
            `Multiply: ${formatNumber(frenzyMultiply)}x | Cost: ${formatNumber(frenzyMultiplyCost)}`;
    }
}

function updateOtherShopsDisplay() {
    const chanceInfo = document.getElementById('frenzyChanceInfo');
    const multiplyInfo = document.getElementById('frenzyMultiplyInfo');
    if (chanceInfo && multiplyInfo) {
        chanceInfo.textContent = `Chance: ${(frenzyChance*100).toFixed(1)}% | Cost: ${frenzyChanceCost.toFixed(0)}`;
        multiplyInfo.textContent = `Multiply: ${frenzyMultiply}x | Cost: ${frenzyMultiplyCost.toFixed(0)}`;
    }
}

// pookie
if(autoClickerCount>0) startAutoClicker();
updateDisplay();
window.addEventListener('beforeunload', saveGame);

</script>
